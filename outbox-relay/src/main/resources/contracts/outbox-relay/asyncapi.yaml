asyncapi: 2.6.0
info:
  title: Resume Outbox Relay Event Contract
  version: 1.0.0
  description: Kafka publish contract for resume-outbox-relay-service.
defaultContentType: application/json
servers:
  kafka:
    protocol: kafka
    url: kafka:9092
channels:
  resume.profile.index:
    description: Profile snapshot event relayed from profile outbox.
    publish:
      operationId: relayProfileIndex
      message:
        $ref: '#/components/messages/ProfileIndexingSnapshot'

  resume.profile.remove:
    description: Profile removal event relayed from profile outbox.
    publish:
      operationId: relayProfileRemove
      message:
        $ref: '#/components/messages/ProfileRemoved'

  resume.auth.restore-access-mail:
    description: Restore access mail event relayed from auth outbox.
    publish:
      operationId: relayRestoreAccessMail
      message:
        $ref: '#/components/messages/RestoreAccessMailRequested'

components:
  messageTraits:
    OutboxHeaders:
      headers:
        type: object
        required: [x-event-id, x-event-type, x-source-service, x-occurred-at]
        properties:
          x-event-id:
            type: string
          x-event-type:
            type: string
            enum: [PROFILE_INDEX, PROFILE_REMOVE, RESTORE_ACCESS_MAIL]
          x-source-service:
            type: string
            enum: [resume-profile-service, resume-auth-service]
          x-occurred-at:
            type: string
            format: date-time

  messages:
    ProfileIndexingSnapshot:
      name: ProfileIndexingSnapshot
      traits:
        - $ref: '#/components/messageTraits/OutboxHeaders'
      payload:
        $ref: '#/components/schemas/ProfileIndexingSnapshot'

    ProfileRemoved:
      name: ProfileRemoved
      traits:
        - $ref: '#/components/messageTraits/OutboxHeaders'
      payload:
        $ref: '#/components/schemas/ProfileRemovalPayload'

    RestoreAccessMailRequested:
      name: RestoreAccessMailRequested
      traits:
        - $ref: '#/components/messageTraits/OutboxHeaders'
      payload:
        $ref: '#/components/schemas/RestoreAccessMailRequestedEvent'

  schemas:
    ProfileIndexingSnapshot:
      type: object
      required: [profileId, uid, firstName, lastName, skills]
      properties:
        profileId:
          type: integer
          format: int64
        uid:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        city:
          type: string
        country:
          type: string
        smallPhoto:
          type: string
        birthDay:
          type: string
          format: date
        objective:
          type: string
        summary:
          type: string
        info:
          type: string
        skills:
          type: array
          items:
            type: string

    ProfileRemovalPayload:
      type: object
      required: [profileId]
      properties:
        profileId:
          type: integer
          format: int64

    RestoreAccessMailRequestedEvent:
      type: object
      required: [email, firstName, link]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        link:
          type: string
