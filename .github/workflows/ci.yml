name: Java CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Fetch pull request base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run strict contract lint (Spectral)
        run: npm run contracts:lint

      - name: Run breaking-change gate
        env:
          SCHEMA_BASE_REF: ${{ github.event.before }}
        run: npm run contracts:check

      - name: Build and run checks
        run: ./mvnw -B -ntp verify
