name: Java CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Fetch pull request base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Install Node.js dependencies
        run: npm ci

      - name: Check contract schema compatibility
        env:
          SCHEMA_BASE_REF: ${{ github.event.before }}
        run: npm run contracts:check

      - name: Build and run checks
        run: ./mvnw -B -ntp verify
