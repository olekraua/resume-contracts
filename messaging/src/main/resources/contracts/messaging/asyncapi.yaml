asyncapi: 2.6.0
info:
  title: Resume Messaging Realtime Contract
  version: 2.0.0
  description: Contract-first definition for custom rt-v1 binary realtime protocol over WebSocket.
defaultContentType: application/json
servers:
  messagingRealtime:
    url: /rt
    protocol: ws
    description: Custom rt-v1 binary WebSocket endpoint
x-rt-protocol: rt-v1
x-rt-frame-version: 1
x-rt-frame-header:
  description: Binary frame header (big-endian)
  fields:
    - name: version
      type: uint8
    - name: type
      type: uint8
    - name: sequence
      type: int64
    - name: payloadLength
      type: int32
channels:
  /user/queue/conversations/{conversationId}/messages:
    description: Destination for conversation message events after SUBSCRIBE frame
    parameters:
      conversationId:
        description: Conversation identifier
        schema:
          type: integer
          format: int64
    subscribe:
      operationId: onConversationMessage
      message:
        $ref: '#/components/messages/ConversationMessage'

  /user/queue/conversations/{conversationId}/read:
    description: Destination for conversation read-marker events after SUBSCRIBE frame
    parameters:
      conversationId:
        description: Conversation identifier
        schema:
          type: integer
          format: int64
    subscribe:
      operationId: onConversationRead
      message:
        $ref: '#/components/messages/ConversationRead'

components:
  messages:
    ConversationMessage:
      name: ConversationMessage
      title: Conversation message event payload
      payload:
        $ref: '#/components/schemas/MessageItem'

    ConversationRead:
      name: ConversationRead
      title: Conversation read event payload
      payload:
        $ref: '#/components/schemas/ReadEvent'

  schemas:
    MessageItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        body:
          type: string
        created:
          type: string
          format: date-time
        edited:
          type: string
          format: date-time
          nullable: true
        deleted:
          type: string
          format: date-time
          nullable: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentItem'
      required: [id, senderId, body, created, attachments]

    AttachmentItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        originalName:
          type: string
        contentType:
          type: string
        size:
          type: integer
          format: int64
      required: [id, originalName, contentType, size]

    ReadEvent:
      type: object
      properties:
        conversationId:
          type: integer
          format: int64
        profileId:
          type: integer
          format: int64
        lastReadMessageId:
          type: integer
          format: int64
      required: [conversationId, profileId, lastReadMessageId]
