asyncapi: 2.6.0
info:
  title: Resume Notification Event Contract
  version: 1.0.0
  description: Kafka topics consumed by resume-notification-service.
defaultContentType: application/json
servers:
  kafka:
    protocol: kafka
    url: kafka:9092
channels:
  resume.auth.restore-access-mail:
    description: Restore access mail request consumed by notification service.
    subscribe:
      operationId: onRestoreAccessMailRequested
      message:
        $ref: '#/components/messages/RestoreAccessMailRequested'

components:
  messageTraits:
    BackboneHeaders:
      headers:
        type: object
        required: [x-event-id, x-event-type, x-source-service, x-occurred-at]
        properties:
          x-event-id:
            type: string
          x-event-type:
            type: string
            enum: [RESTORE_ACCESS_MAIL]
          x-source-service:
            type: string
          x-occurred-at:
            type: string
            format: date-time

  messages:
    RestoreAccessMailRequested:
      name: RestoreAccessMailRequested
      traits:
        - $ref: '#/components/messageTraits/BackboneHeaders'
      payload:
        $ref: '#/components/schemas/RestoreAccessMailRequestedEvent'

  schemas:
    RestoreAccessMailRequestedEvent:
      type: object
      required: [email, firstName, link]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        link:
          type: string
